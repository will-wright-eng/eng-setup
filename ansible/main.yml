---
- hosts: localhost
  connection: local
  gather_facts: no
  become: no
  vars:
    ansible_python_interpreter: /opt/homebrew/bin/python3

  tasks:
  # Shell Environment Setup
  - name: Check if Oh My Zsh is installed
    stat:
      path: ~/.oh-my-zsh
    register: oh_my_zsh_dir
    tags:
      - oh-my-zsh
      - shell-setup

  - name: Install Oh My Zsh
    shell: sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
    args:
      executable: /bin/bash
    when: not oh_my_zsh_dir.stat.exists
    tags:
      - oh-my-zsh
      - shell-setup

  # Package Management - Homebrew
  - name: Install Homebrew packages
    homebrew:
      name: "{{ item }}"
      state: present
    with_items:
      # Development Tools
      - node
      - go
      - gh
      - pre-commit
      - jq
      - bash
      - zoxide
      - ripgrep
      - atuin
      - oven-sh/bun/bun
      - mise
      - tig
      - python@3.14
      # Cloud & Infrastructure
      - awscli
      - opentofu
      - hashicorp/tap/terraform
      - tfenv
      - tflint
      # Docker
      - docker
      - docker-buildx
      - docker-compose
      - docker-completion
      - doctl
      - colima
      # Kubernetes
      # - kubectx
      # - kubernetes-cli
      # - k9s
      # - kustomize
      # System Tools
      - bat
      - tree
      - btop
      - dnsmasq
      - openssh
      - wget
      - blueutil
      - coreutils
      # Shell Enhancements
      - zsh-autosuggestions
      - zsh-syntax-highlighting
      # AI Tools
      - ollama
      - opencode
      # Data
      - postgresql@17
      # Other Tools
      - hugo
      - gnupg
    ignore_errors: yes
    tags:
      - brew-packages

  - name: Install Homebrew cask applications
    homebrew_cask:
      name: "{{ item }}"
      state: present
    with_items:
      # Development Tools
      - ghostty
      - cursor
      - claude-code
      - codex
      - sqlitestudio
      # Browsers
      - ungoogled-chromium
      - google-chrome
      # Productivity
      - raycast
      - rectangle
      - modern-csv
      - zoom
      # Cloud & Infrastructure
      - gcloud-cli
      # Other
      - gopanda
      - rar
    ignore_errors: yes
    tags:
      - brew-casks

  # Shell Configuration
  - name: Remove existing .zshrc if it exists
    file:
      path: ~/.zshrc
      state: absent
    tags:
      - zsh-config
      - shell-setup

  - name: Configure Oh My Zsh
    blockinfile:
      path: ~/.zshrc
      block: |
        # ZSH
        ZSH_THEME="robbyrussell"
        plugins=(git git-prompt web-search jsontools)
        export ZSH="$HOME/.oh-my-zsh"
        source $ZSH/oh-my-zsh.sh

        # for mac M series
        source /opt/homebrew/share/zsh-autosuggestions/zsh-autosuggestions.zsh
        source /opt/homebrew/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh

        # for mac intel
        # source /usr/local/share/zsh-autosuggestions/zsh-autosuggestions.zsh
        # source /usr/local/share/zsh-syntax-highlighting/zsh-syntax-highlighting.zsh

        RPROMPT='%*'

        # ALIAS
        source "$(brew --prefix)/Caskroom/google-cloud-sdk/latest/google-cloud-sdk/completion.zsh.inc"
        eval $(thefuck --alias)

        alias cat='bat --paging=never'
        alias ll='ls -lah'
        alias la='ls -A'
        alias l='ls -CF'
        alias zshconfig="mate ~/.zshrc"
        alias ohmyzsh="mate ~/.oh-my-zsh"

        source ~/keys
        eval "$(atuin init zsh --disable-up-arrow)"
        eval "$(zoxide init zsh)"

        create_env_example() {
            if [ "$#" -ne 1 ]; then
                echo "Usage: dotenvex <path-to-env-file>"
                return 1
            fi

            local ENV_FILE="$1"
            local ENV_EXAMPLE_FILE="${ENV_FILE}.example"

            awk -F '=' '/=/ {
                if (tolower($1) ~ /(key|token|secret|password)/) {
                    print $1 "=REDACTED"
                } else {
                    print $1 "=" $2
                }
            } ! /=/ { print }' "$ENV_FILE" > "$ENV_EXAMPLE_FILE"
            echo "Example environment file created: $ENV_EXAMPLE_FILE"
        }

        alias dotenvex="create_env_example"
      marker: "# {mark} ANSIBLE MANAGED BLOCK"
      create: yes
      backup: yes
    tags:
      - zsh-config
      - shell-setup

  # Git Configuration
  - name: Copy .gitconfig
    copy:
      src: "{{ playbook_dir }}/configs/.gitconfig"
      dest: ~/.gitconfig
      backup: yes
    tags:
      - git-config

  # Post-installation Instructions
  post_tasks:
  - name: Display uv installation instructions
    debug:
      msg: |
        Please install uv in an interactive shell by running:

        curl -LsSf https://astral.sh/uv/install.sh | sh

        After installation, add this to your shell config (~/.zshrc):
        export PATH="$HOME/.local/bin:$PATH"
        eval "$(uv generate-shell-completion zsh)"

        Then restart your shell or run:
        source ~/.zshrc
    tags:
      - uv
      - python-setup
